<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800;900&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-primary": "#e9c400",
              "primary-fixed-dim": "#e9c400",
              "surface-container-low": "#d9ffbd",
              "tertiary-container": "#ffdad2",
              "outline-variant": "#d2c6a1",
              "on-primary-fixed-variant": "#544600",
              "primary": "#705d00",
              "on-primary-container": "#544600",
              "primary-container": "#ffe16d",
              "surface-tint": "#705d00",
              "surface-container-high": "#a5ff6f",
              "tertiary": "#b42800",
              "error": "#ba1a1a",
              "outline": "#807757",
              "on-primary": "#ffffff",
              "on-error-container": "#93000a",
              "secondary-container": "#c6e7ff",
              "inverse-on-surface": "#ceffac",
              "primary-fixed": "#ffe16d",
              "surface-bright": "#eeffdd",
              "secondary-fixed": "#c6e7ff",
              "on-tertiary-container": "#8a1d00",
              "on-secondary-container": "#004c6b",
              "on-tertiary": "#ffffff",
              "surface-container-highest": "#80ff2c",
              "error-container": "#ffdad6",
              "on-background": "#092100",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed-dim": "#81cfff",
              "on-tertiary-fixed-variant": "#8a1d00",
              "inverse-surface": "#153800",
              "background": "#eeffdd",
              "tertiary-fixed-dim": "#ffb4a2",
              "surface-dim": "#72f700",
              "surface-variant": "#80ff2c",
              "on-secondary": "#ffffff",
              "on-secondary-fixed": "#001e2d",
              "surface": "#eeffdd",
              "on-primary-fixed": "#221b00",
              "on-error": "#ffffff",
              "on-secondary-fixed-variant": "#004c6b",
              "on-surface-variant": "#4e462a",
              "on-tertiary-fixed": "#3c0700",
              "secondary": "#00658d",
              "surface-container": "#c2ff99",
              "on-surface": "#092100",
              "tertiary-fixed": "#ffdad2"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .squish-hover:hover {
            transform: scaleX(1.1) scaleY(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .paper-grain {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
        }
    </style>
</head>
<body class="bg-secondary-container font-body text-on-background selection:bg-primary-container overflow-hidden">
<!-- Paper Texture Overlay -->
<div class="fixed inset-0 pointer-events-none paper-grain z-50"></div>
<!-- Sky Background with Clouds -->
<div class="fixed inset-0 bg-gradient-to-b from-[#81cfff] to-[#c6e7ff] -z-10">
<!-- Floating Cloud 1 -->
<div class="absolute top-[10%] left-[15%] w-64 h-32 bg-white rounded-full opacity-80 blur-xl"></div>
<!-- Floating Cloud 2 -->
<div class="absolute top-[40%] right-[10%] w-80 h-40 bg-white rounded-full opacity-60 blur-2xl"></div>
<!-- Floating Cloud 3 -->
<div class="absolute bottom-[20%] left-[-5%] w-96 h-48 bg-white rounded-full opacity-70 blur-xl"></div>
</div>
<!-- Top Navigation (Shell Implementation) -->
<header class="bg-lime-100 dark:bg-lime-900 rounded-b-[3rem] border-b-4 border-emerald-900 flex justify-between items-center w-full px-8 py-6 drop-shadow-[0_8px_0_rgba(9,33,0,0.1)] relative z-40">
<div class="font-['Plus_Jakarta_Sans'] font-black tracking-tighter uppercase text-4xl font-black text-yellow-400 drop-shadow-[0_4px_0_rgba(9,33,0,1)] italic">
            ROLLVOID
        </div>
<div class="flex gap-4">
<button class="text-emerald-800 dark:text-emerald-200 hover:scale-110 hover:rotate-3 transition-transform animate-[bounce_0.5s_infinite]">
<span class="material-symbols-outlined text-4xl" data-icon="star">star</span>
</button>
<button class="text-emerald-800 dark:text-emerald-200 hover:scale-110 hover:rotate-3 transition-transform">
<span class="material-symbols-outlined text-4xl" data-icon="trophy">trophy</span>
</button>
</div>
</header>
<main class="relative h-[calc(100vh-120px)] flex flex-col items-center justify-between py-12 px-6">
<!-- Score Badge -->
<div class="absolute top-4 left-6 rotate-[-5deg]">
<div class="relative bg-white border-4 border-on-background px-6 py-2 rounded-lg shadow-[4px_4px_0px_#092100]">
<div class="absolute -top-6 -left-6 transform rotate-12">
<span class="material-symbols-outlined text-yellow-400 text-5xl drop-shadow-[2px_2px_0px_#092100]" data-icon="grade" style="font-variation-settings: 'FILL' 1;">grade</span>
</div>
<span class="font-headline font-black text-xl tracking-tight uppercase">BEST SCORE: 0</span>
</div>
</div>
<!-- Hero Logo Area -->
<div class="mt-8 relative group">
<h1 class="font-headline font-black text-8xl md:text-9xl text-primary-container italic tracking-tighter drop-shadow-[0_12px_0_rgba(9,33,0,1)] select-none">
                ROLL<span class="text-white">VOID</span>
</h1>
<div class="absolute -bottom-2 right-0 bg-tertiary text-on-tertiary px-4 py-1 rounded-full font-black text-sm rotate-3 border-2 border-on-background shadow-[4px_4px_0px_#092100]">
                V1.0
            </div>
</div>
<!-- Ball Preview Section -->
<div class="relative flex flex-col items-center">
<!-- Grassy Patch -->
<div class="w-64 h-16 bg-surface-container-highest rounded-[100%] blur-md opacity-50 absolute -bottom-4"></div>
<div class="w-48 h-12 bg-surface-container border-b-8 border-inverse-surface rounded-[100%] shadow-inner flex items-center justify-center">
<div class="w-full h-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-surface-container-high to-surface-container rounded-full"></div>
</div>
<!-- Jelly Ball Hero -->
<div class="relative -mt-36 group cursor-pointer transition-transform duration-500 hover:scale-105 active:scale-95">
<!-- Inner Ball Shadow -->
<div class="absolute inset-0 bg-tertiary rounded-full blur-lg opacity-30 translate-y-4"></div>
<!-- Main Body -->
<div class="w-48 h-48 bg-gradient-to-br from-[#ff5c33] via-tertiary to-[#8a1d00] rounded-full border-[6px] border-on-background shadow-[inset_-10px_-10px_20px_rgba(0,0,0,0.3)] relative overflow-hidden">
<!-- Highlight -->
<div class="absolute top-4 left-6 w-16 h-10 bg-white/40 rounded-full blur-sm rotate-[-15deg]"></div>
<!-- Eyes -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex gap-10 w-full justify-center">
<div class="w-4 h-6 bg-on-background rounded-full"></div>
<div class="w-4 h-6 bg-on-background rounded-full"></div>
</div>
<!-- Smile -->
<div class="absolute bottom-12 left-1/2 -translate-x-1/2 w-12 h-6 border-b-[6px] border-on-background rounded-full"></div>
</div>
</div>
</div>
<!-- Action Buttons Container -->
<div class="w-full max-w-md flex flex-col gap-6 items-center mb-16">
<!-- Massive PLAY Button -->
<button class="w-full py-6 bg-surface-container-highest text-on-background rounded-full border-b-[10px] border-emerald-900 font-headline font-black text-4xl uppercase tracking-widest shadow-xl squish-hover active:translate-y-2 active:border-b-0 transition-all duration-150">
                PLAY!
            </button>
<!-- Secondary Actions: Skin and Maps -->
<div class="flex gap-4 w-full">
<button class="flex-1 py-4 bg-primary-container text-on-primary-container rounded-lg border-b-8 border-on-primary-fixed-variant font-headline font-bold text-xl flex items-center justify-center gap-2 hover:rotate-[-2deg] transition-transform active:translate-y-1 active:border-b-4">
<span class="material-symbols-outlined" data-icon="styler">styler</span>
                    SKINS
                </button>
<button class="flex-1 py-4 bg-secondary text-white rounded-lg border-b-8 border-[#001e2d] font-headline font-bold text-xl flex items-center justify-center gap-2 hover:rotate-[2deg] transition-transform active:translate-y-1 active:border-b-4">
<span class="material-symbols-outlined" data-icon="map">map</span>
                    MAPS
                </button>
</div>
</div>
</main>
<!-- Bottom Navigation (Shell Implementation) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-end px-4 h-24 bg-emerald-50 dark:bg-emerald-950 rounded-t-[3rem] border-t-4 border-emerald-900 pb-safe shadow-[0_-8px_40px_rgba(9,33,0,0.06)]">
<!-- Play Tab (Active) -->
<div class="flex flex-col items-center justify-center bg-yellow-400 text-emerald-900 rounded-full p-4 scale-110 -translate-y-4 border-4 border-emerald-900 shadow-[0_4px_0_rgba(9,33,0,1)] hover:scale-105 transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] cursor-pointer">
<span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-xs uppercase">Play</span>
</div>
<!-- Maps Tab -->
<div class="flex flex-col items-center justify-center text-emerald-800 dark:text-emerald-200 p-2 hover:scale-105 transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] active:scale-95 cursor-pointer">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-xs uppercase">Maps</span>
</div>
<!-- Skins Tab -->
<div class="flex flex-col items-center justify-center text-emerald-800 dark:text-emerald-200 p-2 hover:scale-105 transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] active:scale-95 cursor-pointer">
<span class="material-symbols-outlined" data-icon="styler">styler</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-xs uppercase">Skins</span>
</div>
<!-- Shop Tab -->
<div class="flex flex-col items-center justify-center text-emerald-800 dark:text-emerald-200 p-2 hover:scale-105 transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] active:scale-95 cursor-pointer">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-xs uppercase">Shop</span>
</div>
</nav>
<!-- Side Graphic for Flair -->
<div class="fixed top-1/2 -right-12 w-48 h-48 bg-tertiary-container rounded-full opacity-30 blur-3xl pointer-events-none"></div>
</body></html>
