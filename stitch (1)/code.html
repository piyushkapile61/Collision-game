<!DOCTYPE html>

<style>
        body {
            background-color: #ffe16d; /* Primary Container / Sunny Yellow */
            background-image: radial-gradient(#d9c152 20%, transparent 20%);
            background-size: 60px 60px;
        }
        .text-shadow-bubbly {
            text-shadow: 4px 4px 0px #004c6b;
        }
        .plastic-lip-green { box-shadow: 0 8px 0 #153800; }
        .plastic-lip-red { box-shadow: 0 8px 0 #3c0700; }
        .plastic-lip-blue { box-shadow: 0 8px 0 #001e2d; }
        .plastic-lip-purple { box-shadow: 0 8px 0 #2b0054; }
        .plastic-lip-yellow { box-shadow: 0 8px 0 #544600; }
        .marker-stroke { border: 4px solid #092100; }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48;
        }
    </style>

<body class="font-body text-on-background min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Shell -->
<nav class="flex justify-between items-center w-full px-8 py-6 bg-lime-100 dark:bg-lime-900 rounded-b-[3rem] border-b-4 border-emerald-900 drop-shadow-[0_8px_0_rgba(9,33,0,0.1)]">
<div class="flex items-center gap-4">
<span class="text-4xl font-['Plus_Jakarta_Sans'] font-black text-yellow-400 drop-shadow-[0_4px_0_rgba(9,33,0,1)] italic uppercase tracking-tighter">ROLLVOID</span>
</div>
<div class="flex items-center gap-4">
<button class="bg-surface-container-highest p-3 rounded-full border-4 border-emerald-900 shadow-[0_4px_0_rgba(9,33,0,1)] hover:scale-110 hover:rotate-3 transition-transform">
<span class="material-symbols-outlined text-emerald-900" data-icon="star">star</span>
</button>
<button class="bg-surface-container-highest p-3 rounded-full border-4 border-emerald-900 shadow-[0_4px_0_rgba(9,33,0,1)] hover:scale-110 hover:rotate-3 transition-transform">
<span class="material-symbols-outlined text-emerald-900" data-icon="trophy">trophy</span>
</button>
<div class="w-14 h-14 rounded-full border-4 border-emerald-900 overflow-hidden shadow-[0_4px_0_rgba(9,33,0,1)]">
<img alt="Player Profile" data-alt="cute stylized cartoon avatar of a happy character with bright colors and thick outlines on a simple background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCGEICj42nsHwuiD3Ag5WKmY7a074I1X2oyEAqJSePtkFyx2QXUQdgOzXnQ6sJFpxe0veY62FueMC9Gt7df8W6iiA48s9JS9Pfn_e_53QBT7jNR83cmwAXjIRukUkLhm6z5cv3IR2HdrS4EwINa58-848n1Otj0UweiqpJbV2uJOIZEnAhaFQgrKJ3usECkzsRzZ4EfotZvF4ytGT9Yx9d74IbdC21T3lVDy8sjS7obuLYEJYAEdT3HVryGP39_1jzGoeYYXy1IGRk"/>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 gap-12 max-w-5xl mx-auto w-full">
<!-- Header Section -->
<div class="text-center transform -rotate-2">
<h1 class="font-headline font-black text-6xl md:text-8xl text-secondary-container text-shadow-bubbly uppercase tracking-tighter mb-2">
                CHOOSE A GAME!
            </h1>
<p class="font-headline font-bold text-xl text-on-surface-variant bg-surface-container inline-block px-6 py-2 rounded-full border-4 border-on-surface rotate-2">
                PICK YOUR FAVORITE MODE
            </p>
</div>
<!-- Mode Cards Bento Grid -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full">
<!-- ENDLESS -->
<button class="flex flex-col items-center gap-4 bg-surface-container-high p-8 rounded-xl marker-stroke plastic-lip-green hover:scale-105 hover:-rotate-3 transition-all">
<div class="bg-surface-container-lowest p-6 rounded-full marker-stroke mb-2">
<span class="material-symbols-outlined text-6xl text-inverse-surface" data-icon="all_inclusive">all_inclusive</span>
</div>
<span class="font-headline font-black text-2xl text-inverse-surface uppercase">ENDLESS</span>
</button>
<!-- TIME ATTACK -->
<button class="flex flex-col items-center gap-4 bg-tertiary p-8 rounded-xl marker-stroke plastic-lip-red hover:scale-105 hover:rotate-3 transition-all scale-105">
<div class="bg-surface-container-lowest p-6 rounded-full marker-stroke mb-2">
<span class="material-symbols-outlined text-6xl text-tertiary" data-icon="timer">timer</span>
</div>
<span class="font-headline font-black text-2xl text-on-tertiary uppercase">TIME ATTACK</span>
</button>
<!-- CHALLENGE -->
<button class="flex flex-col items-center gap-4 bg-secondary p-8 rounded-xl marker-stroke plastic-lip-blue hover:scale-105 hover:-rotate-3 transition-all">
<div class="bg-surface-container-lowest p-6 rounded-full marker-stroke mb-2">
<span class="material-symbols-outlined text-6xl text-secondary" data-icon="military_tech">military_tech</span>
</div>
<span class="font-headline font-black text-2xl text-on-secondary uppercase">CHALLENGE</span>
</button>
<!-- ZEN -->
<button class="flex flex-col items-center gap-4 bg-[#8a1d00] p-8 rounded-xl marker-stroke plastic-lip-purple hover:scale-105 hover:rotate-3 transition-all">
<div class="bg-surface-container-lowest p-6 rounded-full marker-stroke mb-2">
<span class="material-symbols-outlined text-6xl text-[#8a1d00]" data-icon="local_florist">local_florist</span>
</div>
<span class="font-headline font-black text-2xl text-on-tertiary uppercase">ZEN</span>
</button>
</div>
<!-- Difficulty Selection -->
<div class="flex flex-col items-center gap-6 w-full max-w-2xl bg-surface-container p-10 rounded-xl marker-stroke">
<h3 class="font-headline font-black text-3xl text-on-surface uppercase italic">HOW HARD?</h3>
<div class="flex justify-around w-full gap-4">
<!-- Easy -->
<button class="group flex flex-col items-center gap-2">
<div class="w-24 h-24 bg-surface-container-high rounded-full marker-stroke flex items-center justify-center plastic-lip-green group-hover:scale-110 transition-transform bg-green-400">
<span class="material-symbols-outlined text-6xl text-on-background" data-icon="sentiment_very_satisfied">sentiment_very_satisfied</span>
</div>
<span class="font-headline font-bold text-lg">EASY</span>
</button>
<!-- Normal -->
<button class="group flex flex-col items-center gap-2">
<div class="w-24 h-24 bg-primary-container rounded-full marker-stroke flex items-center justify-center plastic-lip-yellow group-hover:scale-110 transition-transform -translate-y-4 border-[6px]">
<span class="material-symbols-outlined text-6xl text-on-background" data-icon="sentiment_neutral">sentiment_neutral</span>
</div>
<span class="font-headline font-bold text-lg">NORMAL</span>
</button>
<!-- Hard -->
<button class="group flex flex-col items-center gap-2">
<div class="w-24 h-24 bg-tertiary-container rounded-full marker-stroke flex items-center justify-center plastic-lip-red group-hover:scale-110 transition-transform bg-red-400">
<span class="material-symbols-outlined text-6xl text-on-background" data-icon="sentiment_very_dissatisfied">sentiment_very_dissatisfied</span>
</div>
<span class="font-headline font-bold text-lg">HARD</span>
</button>
</div>
</div>
<!-- GO Button -->
<button class="group relative flex items-center justify-center px-16 py-8 bg-surface-container-high rounded-full marker-stroke plastic-lip-green hover:scale-110 transition-all hover:rotate-2">
<div class="flex items-center gap-4">
<span class="font-headline font-black text-7xl text-on-surface uppercase">GO!</span>
<span class="material-symbols-outlined text-7xl text-on-surface animate-bounce" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
</main>
<!-- Navigation Shell Placeholder for Padding -->
<div class="h-24 md:hidden"></div>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-end px-4 h-24 bg-emerald-50 dark:bg-emerald-950 rounded-t-[3rem] border-t-4 border-emerald-900 pb-safe shadow-[0_-8px_40px_rgba(9,33,0,0.06)] md:hidden">
<div class="flex flex-col items-center justify-center bg-yellow-400 text-emerald-900 rounded-full p-4 scale-110 -translate-y-4 border-4 border-emerald-900 shadow-[0_4px_0_rgba(9,33,0,1)]">
<span class="material-symbols-outlined" data-icon="play_arrow">play_arrow</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-xs uppercase">Play</span>
</div>
<div class="flex flex-col items-center justify-center text-emerald-800 dark:text-emerald-200 p-2 hover:scale-105 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-xs uppercase">Maps</span>
</div>
<div class="flex flex-col items-center justify-center text-emerald-800 dark:text-emerald-200 p-2 hover:scale-105 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="styler">styler</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-xs uppercase">Skins</span>
</div>
<div class="flex flex-col items-center justify-center text-emerald-800 dark:text-emerald-200 p-2 hover:scale-105 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold text-xs uppercase">Shop</span>
</div>
</nav>
</body></html>
