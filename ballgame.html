<!DOCTYPE html>
<html>
<head>
    <title>3D Bounce Ball Game</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; background: black; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            z-index: 10;
        }
        #gameOver {
            position: absolute;
            top: 40%;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 40px;
            display: none;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Level: <span id="level">1</span></div>
</div>

<div id="gameOver">
    GAME OVER<br>
    <button onclick="restart()">Restart</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// Scene setup
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000022);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 4, 8);

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
light.castShadow = true;
scene.add(light);

// Floor
let floorGeo = new THREE.PlaneGeometry(50, 50);
let floorMat = new THREE.MeshStandardMaterial({ color: 0x004400 });
let floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// Ball (Player)
let ballGeo = new THREE.SphereGeometry(0.5, 32, 32);
let ballMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
let ball = new THREE.Mesh(ballGeo, ballMat);
ball.position.y = 1;
ball.castShadow = true;
scene.add(ball);

// Physics
let velocity = new THREE.Vector3(0,0,0);
let gravity = -0.02;

// Game variables
let score = 0;
let level = 1;
let coins = [];
let enemies = [];
let gameOver = false;

// Create coin
function createCoin() {
    let geo = new THREE.TorusGeometry(0.3, 0.1, 16, 100);
    let mat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
    let coin = new THREE.Mesh(geo, mat);
    coin.position.set((Math.random()-0.5)*20, 1, (Math.random()-0.5)*20);
    scene.add(coin);
    coins.push(coin);
}

// Create enemy
function createEnemy() {
    let geo = new THREE.BoxGeometry(1,1,1);
    let mat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
    let enemy = new THREE.Mesh(geo, mat);
    enemy.position.set((Math.random()-0.5)*20, 0.5, (Math.random()-0.5)*20);
    enemy.speed = 0.05 + level*0.01;
    scene.add(enemy);
    enemies.push(enemy);
}

// Controls
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Restart
function restart() {
    location.reload();
}

// Game loop
function animate() {
    requestAnimationFrame(animate);

    if(gameOver) return;

    // Movement
    if(keys["w"]) velocity.z = -0.2;
    if(keys["s"]) velocity.z = 0.2;
    if(keys["a"]) velocity.x = -0.2;
    if(keys["d"]) velocity.x = 0.2;

    // Jump
    if(keys[" "] && ball.position.y <= 1.01) {
        velocity.y = 0.4;
    }

    // Physics
    velocity.y += gravity;
    ball.position.add(velocity);

    // Ground collision
    if(ball.position.y < 0.5) {
        ball.position.y = 0.5;
        velocity.y *= -0.6;
    }

    velocity.x *= 0.9;
    velocity.z *= 0.9;

    // Coin animation + collision
    coins.forEach((coin, i) => {
        coin.rotation.y += 0.1;

        if(ball.position.distanceTo(coin.position) < 1) {
            scene.remove(coin);
            coins.splice(i,1);
            score += 10;
            document.getElementById("score").innerText = score;

            if(score % 50 === 0) {
                level++;
                document.getElementById("level").innerText = level;
                createEnemy();
            }

            createCoin();
        }
    });

    // Enemy movement + collision
    enemies.forEach(enemy => {
        enemy.position.x += Math.sin(Date.now()*0.001) * enemy.speed;
        enemy.position.z += Math.cos(Date.now()*0.001) * enemy.speed;

        if(ball.position.distanceTo(enemy.position) < 1) {
            gameOver = true;
            document.getElementById("gameOver").style.display = "block";
        }
    });

    renderer.render(scene, camera);
}

// Initial objects
for(let i=0;i<5;i++) createCoin();
createEnemy();

animate();
</script>

</body>
</html>
